name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Taegliches Rebuild, damit der Vereinsplaner-iCal-Feed
  # neu geholt wird und die "Bevorstehende Termine"-Sektion aktuell bleibt.
  schedule:
    - cron: "0 4 * * *"  # 04:00 UTC = 05:00 CET / 06:00 CEST

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, do not cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install, build and upload site
        uses: withastro/action@v6

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
